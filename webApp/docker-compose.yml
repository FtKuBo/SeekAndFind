services:

 db:
   image: mysql:latest
   environment:
     MYSQL_DATABASE: seekAndFindDb
     MYSQL_USER: seekAndFind
     MYSQL_ROOT_PASSWORD: GJW9
   ports:
     - 3306:3306
   volumes:
     - seek-and-find-db-volume:/var/lib/mysql
   networks:
     - backend 

 client:
   build:
     context: ./client
     dockerfile: Dockerfile
   container_name: client
   ports:
     - 3000:3000
   volumes:
     - ./client:/app
     - /app/node_modules
   environment:
     - VITE_APP_BACKEND_ADDRESS=http://localhost/8080
   networks:
     - frontend

 server:
   build:
    context: ./server
    dockerfile: Dockerfile
   container_name: server
   ports:
     - 8081:8081
   depends_on :
    - db
   environment: # Pass environment variables to the service
     SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/seekAndFindDb?useSSL=false
     SPRING_DATASOURCE_USERNAME: seekAndFind
     SPRING_DATASOURCE_PASSWORD: GJW9     
   networks: # Networks to join (Services on the same network can communicate with each other using their name)
     - backend
     - frontend


volumes:
 seek-and-find-db-volume:

networks:
 backend:
 frontend:
